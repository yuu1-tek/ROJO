<!DOCTYPE html>
<html>
    <head>
        <title>Activity 4</title>
    </head>
    <body>
        <h2>User Information Form</h2>
        <form action="" method="post">
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="firstname" required><br><br>

            <label for="lname">Last Name:</label><br>
            <input type="text" id="lname" name="lastname" required><br><br>

            <label for="age">Age:</label><br>
            <input type="text" id="age" name="age" required><br><br>

            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">other</label>

            <label>Hobbies</label><br>
            <input type="checkbox" id="hobby1" name="hobby" value="reading">
            <label for="hobby1">Reading</label><br>
             <input type="checkbox" id="hobby2" name="hobby" value="reading">
            <label for="hobby2">Sleeping</label><br>
             <input type="checkbox" id="hobby3" name="hobby" value="reading">
            <label for="hobby3">Walking</label><br>
             <input type="checkbox" id="hobby4" name="hobby" value="reading">
            <label for="hobby4">Running</label><br>
             <input type="checkbox" id="hobby5" name="hobby" value="reading">
            <label for="hobby5">Swimming</label><br>

            <label for="yr-lvl">Year Level:</label><br>
            <select name="yr_lvl" id="yr-lvl">
                <option value="1st-yr">1st Year</option>
                <option value="2nd-yr">2nd Year</option>
                <option value="3rd-yr">3rd Year</option>
                <option value="4th-yr">4th Year</option>
            </select><br>

            <button type="submit">Submit</button>
            <button type="reset">Clear</button>
        </form>
    </body>
</html>
