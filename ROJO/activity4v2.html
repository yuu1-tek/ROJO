<!DOCTYPE html>
<html>
<head>
    <title>Activity 4</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            margin-top: 40px;
        }

        form {
            width: 500px;
            margin: 30px auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
        }

        td {
            padding: 10px 5px;
            vertical-align: top;
        }

        label {
            font-weight: bold;
            color: #333;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 95%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            margin-right: 5px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            margin: 5px;
        }

        button[type="submit"] {
            background-color: #4e73df;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #2e59d9;
        }

        button[type="reset"] {
            background-color: #e74a3b;
            color: white;
        }

        button[type="reset"]:hover {
            background-color: #c0392b;
        }
    </style>

</head>
<body>

<h2>User Information Form</h2>

<form action="" method="post">
    <table>

        <tr>
            <td><label for="fname">First Name:</label></td>
            <td><input type="text" id="fname" name="firstname" required></td>
        </tr>

        <tr>
            <td><label for="lname">Last Name:</label></td>
            <td><input type="text" id="lname" name="lastname" required></td>
        </tr>

        <tr>
            <td><label for="age">Age:</label></td>
            <td><input type="number" id="age" name="age" required></td>
        </tr>

        <tr>
            <td>Gender:</td>
            <td>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </td>
        </tr>

        <tr>
            <td>Hobbies:</td>
            <td>
                <input type="checkbox" id="hobby1" name="hobby[]" value="reading">
                <label for="hobby1">Reading</label><br>

                <input type="checkbox" id="hobby2" name="hobby[]" value="sleeping">
                <label for="hobby2">Sleeping</label><br>

                <input type="checkbox" id="hobby3" name="hobby[]" value="walking">
                <label for="hobby3">Walking</label><br>

                <input type="checkbox" id="hobby4" name="hobby[]" value="running">
                <label for="hobby4">Running</label><br>

                <input type="checkbox" id="hobby5" name="hobby[]" value="swimming">
                <label for="hobby5">Swimming</label>
            </td>
        </tr>

        <tr>
            <td><label for="yr-lvl">Year Level:</label></td>
            <td>
                <select name="yr_lvl" id="yr-lvl">
                    <option value="1st-yr">1st Year</option>
                    <option value="2nd-yr">2nd Year</option>
                    <option value="3rd-yr">3rd Year</option>
                    <option value="4th-yr">4th Year</option>
                </select>
            </td>
        </tr>

        <tr>
            <td colspan="2" style="text-align:center;">
                <button type="submit">Submit</button>
                <button type="reset">Clear</button>
            </td>
        </tr>

    </table>
</form>

</body>
</html>
