<!DOCTYPE html>
<html>
    <head>
        <title>Activity 8</title>
        <script>
            function myFunction() {
                var name = "Your name here";
                alert("Hi " + name + " I am an alert box!"); // + sign is concatenation
            }
        </script>
    </head>
    <body>
        <h2>JavaScript Alert</h2>
        <button onclick="myFunction()">Click here!</button>
    </body>
</html>
