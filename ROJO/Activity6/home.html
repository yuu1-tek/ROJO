<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <!-- Professional Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Roboto:wght@300;400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="home.css">
</head>

<body>

<div class="container">

    <!-- HERO -->
    <section class="hero">
        <h1>Ride Beyond Limits</h1>
        <p>Your trusted marketplace for brand new and second-hand motorcycles.</p>
    </section>

    <!-- FEATURED MOTORCYCLES -->
    <section class="featured">
        <h2>Featured Motorcycles</h2>

        <div class="bikes">

            <div class="bike">
                <img src="images/sniper.jpg">
                <p>Yamaha SNIPER</p>
            </div>

            <div class="bike">
                <img src="images/r3.jpg">
                <p>Yamaha R3</p>
            </div>

            <div class="bike">
                <img src="images/nmax.jpg">
                <p>Yamaha NMAX</p>
            </div>

        </div>
    </section>

    <!-- QUOTES -->
    <section class="quotes">

        <p>"Ka-isa ra ang kasaba."</p>
        <p>"Come ride with us!"</p>
    </section>

    <!-- VIDEO MONTAGE -->
    <section class="video">
        <h2>Yamaha  Nmax boys</h2>

        <iframe 
        src="images/montage.mp4"
        title="Motorcycle Montage" autoplay loop>
        </iframe>

    </section>

</div>

</body>
</html>
